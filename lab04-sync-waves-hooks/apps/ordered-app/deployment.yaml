apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordered-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: ordered-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordered-app
  template:
    metadata:
      labels:
        app: ordered-app
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: ordered-app-config
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
