apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: challenge-platform
  namespace: argocd
spec:
  description: Non-production delivery domain for the final challenge
  sourceRepos:
    - https://github.com/desotech-it/DSK213-PUBLIC.git
  destinations:
    - namespace: challenge-*
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: batch
      kind: Job
  orphanedResources:
    warn: true
