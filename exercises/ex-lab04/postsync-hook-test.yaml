apiVersion: batch/v1
kind: Job
metadata:
  name: postsync-cleanup-test
  namespace: dev-ordered
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
        - name: test
          image: busybox
          command: ["echo", "PostSync hook completed"]
      restartPolicy: Never
  backoffLimit: 0
